name: Desplegar reglas de Firestore

# Publica firestore.rules en el proyecto de Firebase cuando las reglas cambian en
# main, y también de forma manual desde la pestaña Actions (workflow_dispatch).
# Autenticación por Workload Identity Federation: GitHub emite un token OIDC
# efímero y Google lo cambia por credenciales de github-rules-deployer. No hay
# clave JSON ni secretos que rotar (la organización prohíbe crear claves de
# cuenta de servicio: política iam.disableServiceAccountKeyCreation).

on:
  push:
    branches: [main]
    paths:
      - firestore.rules
      - firebase.json
      - .firebaserc
      - .github/workflows/deploy-firestore-rules.yml
  workflow_dispatch:

# Evita despliegues de reglas solapados.
concurrency:
  group: deploy-firestore-rules
  cancel-in-progress: false

permissions:
  contents: read
  # Necesario para que GitHub emita el token OIDC que consume Google.
  id-token: write

jobs:
  deploy:
    name: Publicar reglas
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Validar invariantes de las reglas
        # Falla el despliegue si las reglas pierden alguna garantía clave antes
        # de publicarlas (mismo test que corre la CI principal).
        run: npx vitest run app/firestoreRules.test.ts

      - name: Autenticar en Google Cloud (Workload Identity Federation)
        # Escribe un archivo de credenciales efímeras y exporta
        # GOOGLE_APPLICATION_CREDENTIALS; el runner lo descarta al terminar el job.
        # El proveedor solo acepta tokens de este repositorio (attribute-condition).
        uses: google-github-actions/auth@v2
        with:
          project_id: drogas-consulta-externa
          workload_identity_provider: projects/903564757399/locations/global/workloadIdentityPools/github-actions/providers/github
          service_account: github-rules-deployer@drogas-consulta-externa.iam.gserviceaccount.com

      - name: Desplegar solo las reglas de Firestore
        run: >-
          npx --yes firebase-tools@13 deploy
          --only firestore:rules
          --project drogas-consulta-externa
          --non-interactive
