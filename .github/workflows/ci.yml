name: CI

on:
  push:
    branches: [main, 'claude/**']
  pull_request:
    branches: [main]

# Cancela ejecuciones anteriores de la misma rama/PR si llega un push nuevo.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Evita el prompt interactivo la primera vez que Corepack descarga npm.
  COREPACK_ENABLE_DOWNLOAD_PROMPT: 0

jobs:
  verify:
    name: Lint, test y build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Fijar la versión de npm con Corepack
        # Usa la versión declarada en el campo "packageManager" de package.json,
        # para que el lockfile no varíe según la versión de npm del runner.
        run: |
          corepack enable
          npm --version

      - name: Verificar que el lockfile está sincronizado
        # Falla temprano y con un mensaje claro si package.json y
        # package-lock.json no están en sync (el modo en que "npm ci" aborta).
        run: npm ci --dry-run

      - name: Instalar dependencias
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Pruebas
        run: npm test

      - name: Puerta WCAG (axe, foco y contraste)
        run: npm run test:a11y

      - name: Build
        run: npm run build
